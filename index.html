<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saylus Global AI Assistant</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.chat-container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:white;
}

.message-user{
    background:#0079c1;
    color:white;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    width:fit-content;
    max-width:80%;
    margin-left:auto;
}

.message-ai{
    background:#e9ecef;
    color:black;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    width:fit-content;
    max-width:80%;
}

.input-container{
    display:flex;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
}

button{
    background:#0079c1;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#005f96;
}
</style>
</head>
<body>

<div class="chat-container">

    <div class="chat-box" id="chatBox"></div>

    <div class="input-container">
        <input 
            type="text" 
            id="mensaje" 
            placeholder="Ask about fuel consumption, vehicles, reports..."
        >
        
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage(){

    const input = document.getElementById("mensaje");
    const message = input.value;

    if(!message) return;

    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message-user">${message}</div>
    `;

    input.value="";

    try{
        const response = await fetch(
            "https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    question: message
                })
            }
        );

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="message-ai">${data.response}</div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch(error){

        chatBox.innerHTML += `
            <div class="message-ai">
                Error connecting to AI assistant
            </div>
        `;
    }
}
</script>

</body>
</html>

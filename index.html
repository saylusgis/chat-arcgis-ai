<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=350, initial-scale=1.0">
<title>AI Assistant - Saylus Group</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* FIXED WIDTH FOR EXPERIENCE BUILDER */
html,body{
    width:350px;
    height:100%;
    overflow:hidden;
}

body{
    background:#f4f7f5;
    display:flex;
    flex-direction:column;
    border:2px solid #0c662f;
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#001b0d,#003d1f,#005d2f);
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:2px solid #39ff14;
}

.logo{
    width:58px;
    height:58px;
    border-radius:50%;
    overflow:hidden;
    background:white;
    border:2px solid #39ff14;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header-text h1{
    color:#39ff14;
    font-size:18px;
}

.header-text h2{
    font-size:11px;
    font-weight:normal;
}

/* CHAT AREA */
.chat-container{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:14px;

    background:
    radial-gradient(circle at 20% 20%, rgba(57,255,20,0.03), transparent 20%),
    radial-gradient(circle at 80% 80%, rgba(0,100,40,0.04), transparent 25%),
    linear-gradient(#f7faf7,#eef4ef);
}

/* MESSAGES */
.message{
    max-width:82%;
    padding:12px 14px;
    border-radius:18px;
    font-size:13px;
    line-height:1.5;
    word-wrap:break-word;
    box-shadow:0px 2px 6px rgba(0,0,0,0.08);
}

.bot-message{
    background:white;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.user-message{
    background:#dff7da;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

/* RESPONSE BOXES */
.comparison-box{
    margin-top:10px;
    padding:10px;
    background:#eef7ff;
    border-left:4px solid #2196f3;
    border-radius:10px;
    font-size:12px;
}

.conclusion-box{
    margin-top:10px;
    padding:10px;
    background:#edfbe9;
    border-left:4px solid #2ecc71;
    border-radius:10px;
    font-size:12px;
}

.table-box{
    margin-top:10px;
    padding:10px;
    background:#f8f8f8;
    border-radius:10px;
    font-size:12px;
}

/* TYPING */
.typing{
    background:white;
    width:130px;
    padding:12px;
    border-radius:18px;
    display:flex;
    gap:5px;
    align-items:center;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#00a63e;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:0.2s;
}

.typing span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:translateY(0);
    }
    40%{
        transform:translateY(-6px);
    }
}

/* INPUT */
.input-container{
    display:flex;
    gap:10px;
    padding:12px;
    background:white;
    border-top:1px solid #ddd;
}

.input-container input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
    outline:none;
}

.input-container button{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg,#00b140,#39ff14);
    color:white;
    cursor:pointer;
    font-size:18px;
}

.chat-container::-webkit-scrollbar{
    width:4px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:#39ff14;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="https://raw.githubusercontent.com/saylusgis/chat-arcgis-ai/refs/heads/main/logo-ai.png">
    </div>

    <div class="header-text">
        <h1>AI Assistant</h1>
        <h2>SAYLUS GROUP</h2>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message bot-message">
        👋 Hello, I'm your fuel intelligence assistant.<br><br>
        Ask me about:<br><br>
        • Fuel consumption<br>
        • Vehicle costs<br>
        • Fleet performance<br>
        • Fuel pricing<br>
        • Historical comparisons<br>
        • Date analysis
    </div>
</div>

<div class="input-container">
    <input
        type="text"
        id="userInput"
        placeholder="Ask about your fleet..."
        onkeypress="handleEnter(event)"
    >
    <button onclick="sendMessage()" id="sendBtn">➤</button>
</div>

<script>
const WEBHOOK_URL =
"https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement";

let isProcessing = false;


/* ADD USER MESSAGE */
function addUserMessage(text){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message user-message";
    div.innerHTML = text;

    chat.appendChild(div);
    scrollBottom();
}


/* ADD BOT MESSAGE */
function addBotMessage(html){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message bot-message";
    div.innerHTML = html;

    chat.appendChild(div);
    scrollBottom();
}


/* TYPING */
function showTyping(){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typingIndicator";

    div.innerHTML = `
        <span></span>
        <span></span>
        <span></span>
        <small>Analyzing...</small>
    `;

    chat.appendChild(div);
    scrollBottom();
}

function removeTyping(){
    const typing =
        document.getElementById("typingIndicator");

    if(typing) typing.remove();
}


/* GREETINGS */
function isGreeting(text){
    const greetings = [
        "hola","hello","hi","hey","buenas"
    ];

    return greetings.includes(
        text.toLowerCase().trim()
    );
}

function greetingResponse(text){
    if(text.toLowerCase().includes("hola")){
        return `
        👋 Hola, soy AI Assistant Saylus Group.<br><br>
        ¿En qué puedo ayudarte hoy?
        `;
    }

    return `
    👋 Hello, I'm AI Assistant Saylus Group.<br><br>
    How can I help you today?
    `;
}


/* FORMAT RESPONSE */
function formatResponse(data){

    let html = "";

    if(data.response?.mainResponse){
        html += `<div>${data.response.mainResponse}</div>`;
    }

    if(data.response?.comparison?.message){
        html += `
        <div class="comparison-box">
            📊 ${data.response.comparison.message}
        </div>`;
    }

    if(data.response?.conclusion?.message){
        html += `
        <div class="conclusion-box">
            ✅ ${data.response.conclusion.message}
        </div>`;
    }

    if(data.topVehicles?.length){
        html += `
        <div class="table-box">
        <b>Top Vehicles:</b><br><br>
        ${data.topVehicles.map(v =>
            `• ${v.vehicle}: ${v.fuel} L`
        ).join("<br>")}
        </div>`;
    }

    if(data.monthlyAnalysis?.trends?.length){
        html += `
        <div class="table-box">
        <b>Monthly Trend:</b><br><br>
        ${data.monthlyAnalysis.trends.map(m =>
            `• ${m.month}: ${m.fuel} L`
        ).join("<br>")}
        </div>`;
    }

    if(data.recentDailyFuelPrices?.length){
        html += `
        <div class="table-box">
        <b>Recent Prices:</b><br><br>
        ${data.recentDailyFuelPrices.map(d =>
            `• ${d.date}: ${d.avgPrice}`
        ).join("<br>")}
        </div>`;
    }

    if(!html){
        html = "No response generated.";
    }

    return html;
}


/* SEND MESSAGE */
async function sendMessage(){

    if(isProcessing) return;

    const input =
        document.getElementById("userInput");

    const message =
        input.value.trim();

    if(!message) return;

    addUserMessage(message);

    input.value = "";

    if(isGreeting(message)){
        setTimeout(()=>{
            addBotMessage(
                greetingResponse(message)
            );
        },500);
        return;
    }

    isProcessing = true;
    document.getElementById("sendBtn").disabled = true;

    showTyping();

    try{
        const response = await fetch(
            WEBHOOK_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    question:message
                })
            }
        );

        const data = await response.json();

        removeTyping();

        addBotMessage(
            formatResponse(data)
        );

    } catch(error){

        removeTyping();

        addBotMessage(`
            ❌ Error connecting to AI service.
            Please try again.
        `);

        console.error(error);
    }

    isProcessing = false;
    document.getElementById("sendBtn").disabled = false;
}


/* ENTER */
function handleEnter(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}


/* AUTOSCROLL */
function scrollBottom(){
    const chat =
        document.getElementById("chatContainer");

    chat.scrollTop =
        chat.scrollHeight;
}
</script>

</body>
</html>

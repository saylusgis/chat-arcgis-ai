<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=350, initial-scale=1.0">
<title>AI Saylus Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html,body{
    width:350px;
    height:100vh;
    overflow:hidden;
    background:transparent;
}

/* PANEL */
.chat-panel{
    width:350px;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:rgba(255,255,255,0.98);
    border-left:3px solid #39ff14;
    border-radius:18px 0px 0px 18px;
    overflow:hidden;
    box-shadow:-8px 0px 25px rgba(0,0,0,0.35);
}

/* HEADER */
.chat-header{
    height:105px;
    background:linear-gradient(
        135deg,
        #021b0f 0%,
        #0b2e13 50%,
        #14532d 100%
    );
    display:flex;
    align-items:center;
    padding:15px;
    border-bottom:2px solid #39ff14;
    position:relative;
}

.chat-header::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(
            circle at top right,
            rgba(57,255,20,0.18),
            transparent 40%
        );
}

.bot-logo{
    width:70px;
    height:70px;
    min-width:70px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #39ff14;
    background:white;
    z-index:2;
}

.bot-logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header-text{
    margin-left:12px;
    z-index:2;
}

.header-text h2{
    color:#39ff14;
    font-size:22px;
    font-weight:bold;
}

.header-text p{
    color:white;
    font-size:12px;
    letter-spacing:1px;
}

/* CHAT BODY */
.chat-body{
    flex:1;
    overflow-y:auto;
    padding:18px;
    background:
        linear-gradient(
            rgba(255,255,255,0.98),
            rgba(247,255,247,0.98)
        );
    position:relative;
}

.chat-body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(
            rgba(0,150,0,0.03) 1px,
            transparent 1px
        );
    background-size:24px 24px;
    pointer-events:none;
}

/* MESSAGES */
.message{
    position:relative;
    z-index:2;
    margin-bottom:15px;
    padding:12px;
    border-radius:14px;
    max-width:90%;
    font-size:14px;
    line-height:1.5;
    white-space:pre-line;
}

.user{
    background:#0b5e20;
    color:white;
    margin-left:auto;
}

.bot{
    background:#edf7ed;
    color:#0b2e13;
    border:1px solid rgba(0,100,0,0.08);
}

/* LOADER */
.loading-container{
    display:none;
    text-align:center;
    padding:15px;
    z-index:2;
    position:relative;
}

.loader-spinner{
    width:35px;
    height:35px;
    margin:auto;
    border:4px solid rgba(0,0,0,0.1);
    border-top:4px solid #39ff14;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.loading-text{
    margin-top:10px;
    font-size:13px;
    color:#14532d;
    font-weight:bold;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* INPUT */
.chat-input{
    height:80px;
    display:flex;
    align-items:center;
    padding:15px;
    background:white;
    border-top:1px solid #e5e5e5;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #d9d9d9;
    border-radius:30px;
    outline:none;
    font-size:14px;
}

.chat-input button{
    width:48px;
    height:48px;
    margin-left:10px;
    border:none;
    border-radius:50%;
    background:#39ff14;
    color:#0b2e13;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.chat-input button:hover{
    background:#25cc0f;
}

.chat-input button:disabled{
    background:#a5a5a5;
    cursor:not-allowed;
}

/* SCROLL */
.chat-body::-webkit-scrollbar{
    width:6px;
}

.chat-body::-webkit-scrollbar-thumb{
    background:#39ff14;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="chat-panel">

    <!-- HEADER -->
    <div class="chat-header">
        <div class="bot-logo">
            <img src="logo-ai.png" alt="AI Logo">
        </div>

        <div class="header-text">
            <h2>AI Assistant</h2>
            <p>SAYLUS GROUP</p>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-body" id="chatBox">

        <div class="message bot">
Hello, I'm your fuel intelligence assistant.

Ask me about:

• Fuel consumption  
• Vehicle costs  
• Fleet performance  
• Fuel pricing  
• Operational analytics
        </div>

        <!-- LOADER -->
        <div class="loading-container" id="loadingContainer">
            <div class="loader-spinner"></div>
            <div class="loading-text" id="loadingText">
                Processing...
            </div>
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
        <input
            type="text"
            id="messageInput"
            placeholder="Ask about your fleet..."
        >

        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
const webhookURL =
"https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement";

const loadingMessages = [
    "Analyzing fuel records...",
    "Calculating fleet metrics...",
    "Comparing vehicles...",
    "Generating AI response..."
];

let loadingInterval = null;
let loadingIndex = 0;


// Detect language
function detectLanguage(text){
    const spanishWords = [
        "cuál","cual","combustible",
        "vehiculo","vehículo",
        "litros","costo"
    ];

    const lower = text.toLowerCase();

    return spanishWords.some(word => lower.includes(word))
        ? "es"
        : "en";
}


// Add message
function addMessage(text,type){
    const chatBox =
        document.getElementById("chatBox");

    const div =
        document.createElement("div");

    div.className = `message ${type}`;
    div.innerText = text;

    chatBox.appendChild(div);

    chatBox.scrollTop =
        chatBox.scrollHeight;
}


// Show loader
function showLoader(language){

    const loader =
        document.getElementById(
            "loadingContainer"
        );

    const loadingText =
        document.getElementById(
            "loadingText"
        );

    const messages =
        language === "es"
        ? [
            "Analizando registros...",
            "Calculando métricas...",
            "Comparando vehículos...",
            "Generando respuesta..."
          ]
        : loadingMessages;

    loader.style.display = "block";

    loadingIndex = 0;
    loadingText.innerText =
        messages[0];

    loadingInterval =
        setInterval(() => {
            loadingIndex =
                (loadingIndex + 1) %
                messages.length;

            loadingText.innerText =
                messages[loadingIndex];
        },1500);
}


// Hide loader
function hideLoader(){
    const loader =
        document.getElementById(
            "loadingContainer"
        );

    loader.style.display="none";

    clearInterval(
        loadingInterval
    );
}


// Format structured response
function formatResponse(data){

    let text = "";

    if(data.response?.mainResponse){
        text += data.response.mainResponse + "\n\n";
    }

    if(data.response?.comparison?.message){
        text +=
        "📊 " +
        data.response.comparison.message +
        "\n\n";
    }

    if(data.response?.justification?.message){
        text +=
        "📌 " +
        data.response.justification.message;
    }

    return text || "No response available.";
}


// Send message
async function sendMessage(){

    const input =
        document.getElementById(
            "messageInput"
        );

    const button =
        document.getElementById(
            "sendBtn"
        );

    const message =
        input.value.trim();

    if(!message) return;

    const language =
        detectLanguage(message);

    addMessage(message,"user");

    input.value="";

    button.disabled = true;

    showLoader(language);

    try{

        const response =
            await fetch(
                webhookURL,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":
                        "application/json"
                    },
                    body: JSON.stringify({
                        question: message,
                        language: language
                    })
                }
            );

        const data =
            await response.json();

        hideLoader();

        const formattedText =
            formatResponse(data);

        addMessage(
            formattedText,
            "bot"
        );

    } catch(error){

        hideLoader();

        addMessage(
            language === "es"
            ? "Error de conexión con el servicio AI."
            : "Connection error with AI service.",
            "bot"
        );
    }

    button.disabled = false;
}


// Enter key
document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    function(e){
        if(e.key === "Enter"){
            sendMessage();
        }
    }
);
</script>

</body>
</html>

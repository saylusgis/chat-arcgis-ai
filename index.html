<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Saylus Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

html, body{
    width:350px;
    height:100vh;
    overflow:hidden;
    background:transparent;
}

/* PANEL PRINCIPAL */
.chat-panel{
    width:350px;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:rgba(255,255,255,0.97);
    border-left:3px solid #39ff14;
    box-shadow:-8px 0px 25px rgba(0,0,0,0.35);
    border-radius:18px 0px 0px 18px;
    overflow:hidden;
}

/* HEADER */
.chat-header{
    height:105px;
    background:linear-gradient(
        135deg,
        #021b0f 0%,
        #0b2e13 50%,
        #14532d 100%
    );
    display:flex;
    align-items:center;
    padding:15px;
    position:relative;
    border-bottom:2px solid #39ff14;
}

.chat-header::before{
    content:"";
    position:absolute;
    top:0;
    right:0;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at top right,
        rgba(57,255,20,0.25),
        transparent 35%);
    pointer-events:none;
}

/* LOGO */
.bot-logo{
    width:70px;
    height:70px;
    min-width:70px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #39ff14;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2;
}

.bot-logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXTO HEADER */
.header-text{
    margin-left:12px;
    z-index:2;
}

.header-text h2{
    color:#39ff14;
    font-size:22px;
    font-weight:bold;
}

.header-text p{
    color:white;
    font-size:13px;
    letter-spacing:1px;
}

/* BODY */
.chat-body{
    flex:1;
    overflow-y:auto;
    padding:18px;
    background:
        linear-gradient(
            rgba(255,255,255,0.98),
            rgba(247,255,247,0.98)
        );
    position:relative;
}

/* textura suave */
.chat-body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(rgba(0,150,0,0.03) 1px, transparent 1px);
    background-size:24px 24px;
    pointer-events:none;
}

/* mensajes */
.message{
    position:relative;
    z-index:2;
    margin-bottom:15px;
    padding:12px;
    border-radius:14px;
    max-width:90%;
    font-size:14px;
    line-height:1.4;
}

.user{
    background:#0b5e20;
    color:white;
    margin-left:auto;
}

.bot{
    background:#edf7ed;
    color:#0b2e13;
    border:1px solid rgba(0,100,0,0.08);
}

/* INPUT */
.chat-input{
    height:80px;
    display:flex;
    align-items:center;
    padding:15px;
    background:white;
    border-top:1px solid #e5e5e5;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #d9d9d9;
    border-radius:30px;
    outline:none;
    font-size:14px;
}

.chat-input button{
    width:48px;
    height:48px;
    margin-left:10px;
    border:none;
    border-radius:50%;
    background:#39ff14;
    color:#0b2e13;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.chat-input button:hover{
    background:#25cc0f;
}

/* scrollbar */
.chat-body::-webkit-scrollbar{
    width:6px;
}

.chat-body::-webkit-scrollbar-thumb{
    background:#39ff14;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="chat-panel">

    <!-- HEADER -->
    <div class="chat-header">
        
        <div class="bot-logo">
            <img src="logo-ai.png" alt="AI Logo">
        </div>

        <div class="header-text">
            <h2>AI Assistant</h2>
            <p>SAYLUS GROUP</p>
        </div>

    </div>

    <!-- CHAT BODY -->
    <div class="chat-body" id="chatBox">

        <div class="message bot">
            Hello, I'm your fuel intelligence assistant. Ask me about:
            <br><br>
            • Fuel consumption  
            • Vehicle costs  
            • Fleet performance  
            • Reports & invoices  
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
        <input 
            type="text"
            id="messageInput"
            placeholder="Ask about your fleet..."
        >
        
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
async function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    const chatBox = document.getElementById("chatBox");

    // mensaje usuario
    chatBox.innerHTML += `
        <div class="message user">${message}</div>
    `;

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    try{
        const response = await fetch(
            "https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    pregunta: message
                })
            }
        );

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="message bot">
                ${data.respuesta}
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch(error){

        chatBox.innerHTML += `
            <div class="message bot">
                Connection error with AI service.
            </div>
        `;
    }
}
</script>

</body>
</html>

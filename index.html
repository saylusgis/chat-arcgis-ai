<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Saylus Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    width:325px;
    height:100vh;
    overflow:hidden;
    background:transparent;
}

/* PANEL PRINCIPAL */
.chat-panel{
    width:325px;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:rgba(255,255,255,0.95);
    border-left:3px solid #00ff66;
    box-shadow:-8px 0px 25px rgba(0,0,0,0.35);
    border-radius:20px 0px 0px 20px;
    overflow:hidden;
}

/* HEADER */
.chat-header{
    height:110px;
    background:linear-gradient(
        135deg,
        #021b0f,
        #0b2e13,
        #14532d
    );
    color:white;
    display:flex;
    align-items:center;
    padding:15px;
    position:relative;
}

.chat-header::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top right,
        rgba(57,255,20,0.3),
        transparent 40%);
}

.bot-logo{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid #39ff14;
    margin-right:10px;
    z-index:2;
}

.bot-logo img{
    width:45px;
}

.header-text{
    z-index:2;
}

.header-text h2{
    font-size:20px;
    color:#39ff14;
}

.header-text p{
    font-size:12px;
    color:white;
}

/* CHAT BODY */
.chat-body{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:
        linear-gradient(
            rgba(255,255,255,0.95),
            rgba(245,255,245,0.95)
        );
}

/* textura suave */
.chat-body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(
            rgba(0,150,0,0.05) 1px,
            transparent 1px
        );
    background-size:20px 20px;
    pointer-events:none;
}

/* mensajes */
.message{
    margin-bottom:15px;
    padding:12px;
    border-radius:12px;
    max-width:90%;
}

.user{
    background:#0b5e20;
    color:white;
    margin-left:auto;
}

.bot{
    background:#edf7ed;
    color:#0b2e13;
}

/* INPUT */
.chat-input{
    height:80px;
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:30px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    width:50px;
    border:none;
    border-radius:50%;
    background:#39ff14;
    color:#0b2e13;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.chat-input button:hover{
    background:#28cc0f;
}
</style>
</head>
<body>

<div class="chat-panel">

    <div class="chat-header">
        <div class="bot-logo">
            🤖
        </div>

        <div class="header-text">
            <h2>AI Assistant</h2>
            <p>Saylus Group</p>
        </div>
    </div>

    <div class="chat-body" id="chatBox">
        <div class="message bot">
            Hello, how can I help you with fuel management today?
        </div>
    </div>

    <div class="chat-input">
        <input 
            type="text" 
            id="messageInput"
            placeholder="Ask about vehicles..."
        >
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
async function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">${message}</div>
    `;

    input.value="";

    chatBox.scrollTop = chatBox.scrollHeight;

    try{
        const response = await fetch(
            "https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    pregunta: message
                })
            }
        );

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="message bot">
                ${data.respuesta}
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch(error){

        chatBox.innerHTML += `
            <div class="message bot">
                Connection error with AI service
            </div>
        `;
    }
}
</script>

</body>
</html>

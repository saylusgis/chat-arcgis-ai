<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=350, initial-scale=1.0">
<title>AI Assistant - Saylus Group</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* =========================
   FIXED WIDTH
========================= */
html, body{
    width:350px;
    height:100%;
    overflow:hidden;
}

body{
    background:#f4f7f5;
    display:flex;
    flex-direction:column;
    border:2px solid #0c662f;
}

/* =========================
   HEADER
========================= */
.header{
    background:linear-gradient(90deg,#001b0d,#003d1f,#005d2f);
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:2px solid #39ff14;
}

.logo{
    width:58px;
    height:58px;
    border-radius:50%;
    overflow:hidden;
    background:white;
    border:2px solid #39ff14;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header-text h1{
    color:#39ff14;
    font-size:18px;
    font-weight:bold;
}

.header-text h2{
    font-size:11px;
    font-weight:normal;
}

/* =========================
   CHAT
========================= */
.chat-container{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:14px;

    background:
    radial-gradient(circle at 20% 20%, rgba(57,255,20,0.03), transparent 20%),
    radial-gradient(circle at 80% 80%, rgba(0,100,40,0.04), transparent 25%),
    linear-gradient(#f7faf7,#eef4ef);
}

/* =========================
   MESSAGES
========================= */
.message{
    max-width:82%;
    padding:12px 14px;
    border-radius:18px;
    font-size:13px;
    line-height:1.5;
    word-wrap:break-word;
    box-shadow:0px 2px 6px rgba(0,0,0,0.08);
}

.bot-message{
    background:white;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.user-message{
    background:#dff7da;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

/* =========================
   ANALYTICS BOXES
========================= */
.comparison-box{
    margin-top:10px;
    padding:10px;
    background:#eef7ff;
    border-left:4px solid #2196f3;
    border-radius:10px;
    font-size:12px;
}

.conclusion-box{
    margin-top:10px;
    padding:10px;
    background:#edfbe9;
    border-left:4px solid #2ecc71;
    border-radius:10px;
    font-size:12px;
}

.table-box{
    margin-top:10px;
    padding:10px;
    background:#f8f8f8;
    border-radius:10px;
    font-size:12px;
}

/* =========================
   TYPING
========================= */
.typing{
    background:white;
    width:160px;
    padding:12px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:6px;
    box-shadow:0px 2px 6px rgba(0,0,0,0.08);
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#00a63e;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:0.2s;
}

.typing span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{transform:translateY(0);}
    40%{transform:translateY(-6px);}
}

/* =========================
   INPUT
========================= */
.input-container{
    display:flex;
    gap:10px;
    padding:12px;
    background:white;
    border-top:1px solid #ddd;
}

.input-container input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
    outline:none;
    font-size:13px;
}

.input-container button{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg,#00b140,#39ff14);
    color:white;
    cursor:pointer;
    font-size:18px;
}

.chat-container::-webkit-scrollbar{
    width:4px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:#39ff14;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="https://raw.githubusercontent.com/saylusgis/chat-arcgis-ai/refs/heads/main/logo-ai.png">
    </div>

    <div class="header-text">
        <h1>AI Assistant</h1>
        <h2>SAYLUS GROUP</h2>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message bot-message">
        👋 Hello, I'm your fuel intelligence assistant.<br><br>
        Ask me about:<br><br>
        • Fuel consumption<br>
        • Vehicle costs<br>
        • Fleet performance<br>
        • Fuel pricing<br>
        • Historical comparisons<br>
        • Date analysis
    </div>
</div>

<div class="input-container">
    <input
        type="text"
        id="userInput"
        placeholder="Ask about your fleet..."
        onkeypress="handleEnter(event)"
    >
    <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const WEBHOOK_URL =
"https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement";

let isProcessing = false;

function formatNumber(value){
    if(value === null || value === undefined || isNaN(value)) return value;
    return Number(value).toFixed(2);
}

function detectLanguage(text){
    const spanishWords = [
        "hola","combustible","vehiculo",
        "precio","costo","mes",
        "semana","litros"
    ];

    const lower = text.toLowerCase();

    return spanishWords.some(word =>
        lower.includes(word)
    ) ? "es" : "en";
}

function addUserMessage(text){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message user-message";
    div.innerHTML = text;

    chat.appendChild(div);
    scrollBottom();
}

function addBotMessage(html){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message bot-message";
    div.innerHTML = html;

    chat.appendChild(div);
    scrollBottom();
}

function showTyping(lang){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typingIndicator";

    div.innerHTML = `
        <span></span>
        <span></span>
        <span></span>
        <small>${lang==="es"?"Analizando...":"Analyzing..."}</small>
    `;

    chat.appendChild(div);
    scrollBottom();
}

function removeTyping(){
    const typing = document.getElementById("typingIndicator");
    if(typing) typing.remove();
}

function formatResponse(data){

    const question = (data.question || "").toLowerCase();
    const lang = data.language || "es";

    let html = "";

    if(data.response?.mainResponse){
        html += `<div>${data.response.mainResponse}</div>`;
    }

    if(data.response?.comparison?.message){
        html += `
        <div class="comparison-box">
            📊 <strong>${lang==="es"?"Comparación":"Comparison"}:</strong><br>
            ${data.response.comparison.message}
        </div>`;
    }

    if(data.response?.conclusion?.message){
        html += `
        <div class="conclusion-box">
            ✅ <strong>${lang==="es"?"Conclusión":"Conclusion"}:</strong><br>
            ${data.response.conclusion.message}
        </div>`;
    }

    const askTop =
        question.includes("top") ||
        question.includes("vehiculos") ||
        question.includes("vehicles");

    const askMonthly =
        question.includes("monthly") ||
        question.includes("mensual") ||
        question.includes("mes");

    const askWeekly =
        question.includes("weekly") ||
        question.includes("semanal") ||
        question.includes("week");

    const askPrices =
        question.includes("price") ||
        question.includes("precio");

    if(askTop && data.topVehicles?.length){
        html += `
        <div class="table-box">
            <strong>${lang==="es"?"Vehículos principales":"Top Vehicles"}</strong><br><br>
            ${data.topVehicles.map(v =>
                `• ${v.vehicle}: ${formatNumber(v.fuel)} L`
            ).join("<br>")}
        </div>`;
    }

    if(askMonthly && data.monthlyAnalysis?.trends?.length){
        html += `
        <div class="table-box">
            <strong>${lang==="es"?"Tendencia mensual":"Monthly Trend"}</strong><br><br>
            ${data.monthlyAnalysis.trends.map(m =>
                `• ${m.month}: ${formatNumber(m.fuel)} L`
            ).join("<br>")}
        </div>`;
    }

    if(askWeekly && data.weeklyAnalysis?.trends?.length){
        html += `
        <div class="table-box">
            <strong>${lang==="es"?"Tendencia semanal":"Weekly Trend"}</strong><br><br>
            ${data.weeklyAnalysis.trends.map(w =>
                `• Week ${w.week}: ${formatNumber(w.fuel)} L`
            ).join("<br>")}
        </div>`;
    }

    if(askPrices && data.recentDailyFuelPrices?.length){
        html += `
        <div class="table-box">
            <strong>${lang==="es"?"Precios recientes":"Recent Prices"}</strong><br><br>
            ${data.recentDailyFuelPrices.map(d =>
                `• ${d.date}: ${formatNumber(d.avgPrice)}`
            ).join("<br>")}
        </div>`;
    }

    return html || (
        lang==="es"
        ? "No se generó respuesta."
        : "No response generated."
    );
}

async function sendMessage(){

    if(isProcessing) return;

    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    const message = input.value.trim();

    if(!message) return;

    const lang = detectLanguage(message);

    addUserMessage(message);

    input.value = "";

    isProcessing = true;
    sendBtn.disabled = true;

    showTyping(lang);

    try{
        const response = await fetch(WEBHOOK_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                question:message,
                language:lang
            })
        });

        const data = await response.json();

        removeTyping();
        addBotMessage(formatResponse(data));

    }catch(error){

        removeTyping();

        addBotMessage(
            lang==="es"
            ? "Error de conexión con el servicio."
            : "Connection error."
        );

        console.error(error);
    }

    isProcessing=false;
    sendBtn.disabled=false;
}

function handleEnter(event){
    if(event.key==="Enter"){
        sendMessage();
    }
}

function scrollBottom(){
    const chat =
        document.getElementById("chatContainer");

    chat.scrollTop =
        chat.scrollHeight;
}
</script>

</body>
</html>

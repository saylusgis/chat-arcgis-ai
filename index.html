<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant - Saylus Group</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7f6;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#001f0f,#003d1f,#005c2d);
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    border-bottom:2px solid #39ff14;
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
    background:white;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    border:3px solid #39ff14;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header-text h1{
    color:#39ff14;
    font-size:22px;
}

.header-text h2{
    font-size:14px;
    font-weight:normal;
}

/* CHAT AREA */
.chat-container{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:80%;
    padding:14px;
    border-radius:18px;
    line-height:1.5;
    white-space:pre-line;
}

.bot-message{
    background:#dce6dc;
    align-self:flex-start;
}

.user-message{
    background:#39ff14;
    color:black;
    align-self:flex-end;
}

/* Typing animation */
.typing{
    background:#dce6dc;
    width:120px;
    padding:14px;
    border-radius:18px;
    display:flex;
    gap:6px;
    align-self:flex-start;
}

.typing span{
    width:10px;
    height:10px;
    background:#00aa44;
    border-radius:50%;
    animation: bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:0.2s;
}

.typing span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:translateY(0);
    }
    40%{
        transform:translateY(-8px);
    }
}

/* INPUT AREA */
.input-container{
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
    gap:10px;
}

.input-container input{
    flex:1;
    padding:15px;
    border-radius:25px;
    border:1px solid #ccc;
    font-size:16px;
}

.input-container button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    background:#39ff14;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
}

/* tables */
.response-table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:14px;
}

.response-table th,
.response-table td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

.response-table th{
    background:#003d1f;
    color:white;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <!-- REEMPLAZAR CON TU URL REAL -->
        <img src="https://TU-USUARIO.github.io/TU-REPO/logo-ai.png" alt="AI Logo">
    </div>

    <div class="header-text">
        <h1>AI Assistant</h1>
        <h2>SAYLUS GROUP</h2>
    </div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer">

    <div class="message bot-message">
Hello, I'm your fuel intelligence assistant.

Ask me about:

• Fuel consumption  
• Vehicle costs  
• Fleet performance  
• Fuel pricing  
• Operational analytics
    </div>

</div>

<!-- INPUT -->
<div class="input-container">
    <input 
        type="text" 
        id="userInput" 
        placeholder="Ask about your fleet..."
        onkeypress="handleEnter(event)"
    >
    <button onclick="sendMessage()" id="sendBtn">➤</button>
</div>

<script>
const WEBHOOK_URL = "TU_WEBHOOK_N8N";

let isProcessing = false;

//------------------------------------------
// ADD USER MESSAGE
//------------------------------------------
function addUserMessage(message){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message user-message";
    div.textContent = message;

    chat.appendChild(div);
    scrollToBottom();
}

//------------------------------------------
// ADD BOT MESSAGE
//------------------------------------------
function addBotMessage(message){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message bot-message";

    div.innerHTML = formatResponse(message);

    chat.appendChild(div);
    scrollToBottom();
}

//------------------------------------------
// FORMAT RESPONSE
//------------------------------------------
function formatResponse(message){

    if(typeof message !== "string"){
        return JSON.stringify(message,null,2);
    }

    return message
        .replace(/\n/g,"<br>")
        .replace(/\|/g,"");
}

//------------------------------------------
// TYPING INDICATOR
//------------------------------------------
function showTypingIndicator(){
    const chat = document.getElementById("chatContainer");

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.id = "typingIndicator";

    typing.innerHTML = `
        <span></span>
        <span></span>
        <span></span>
    `;

    chat.appendChild(typing);
    scrollToBottom();
}

function removeTypingIndicator(){
    const typing = document.getElementById("typingIndicator");

    if(typing){
        typing.remove();
    }
}

//------------------------------------------
// GREETING DETECTION
//------------------------------------------
function isGreeting(message){

    const greetings = [
        "hello",
        "hi",
        "hey",
        "hola",
        "buenas",
        "buenos dias",
        "buen día",
        "good morning",
        "good afternoon"
    ];

    const lower = message.toLowerCase().trim();

    return greetings.some(g => lower === g || lower.includes(g));
}

//------------------------------------------
// LOCAL GREETING RESPONSE
//------------------------------------------
function greetingResponse(message){

    const lower = message.toLowerCase();

    if(
        lower.includes("hola") ||
        lower.includes("buenas")
    ){
        return `
👋 Hola, soy <b>AI Assistant Saylus Group</b>.

Puedo ayudarte con:

• Consumo de combustible  
• Costos por vehículo  
• Rendimiento operativo  
• Incremento de precios  
• Comparativos históricos  
• Análisis por fechas

¿En qué puedo ayudarte?
        `;
    }

    return `
👋 Hello, I'm <b>AI Assistant Saylus Group</b>.

I can help you with:

• Fuel consumption  
• Vehicle costs  
• Operational performance  
• Fuel pricing  
• Historical comparisons  
• Date analysis

How can I help you today?
    `;
}

//------------------------------------------
// SEND MESSAGE
//------------------------------------------
async function sendMessage(){

    if(isProcessing) return;

    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    const message = input.value.trim();

    if(!message) return;

    addUserMessage(message);

    input.value = "";

    //-----------------------------------
    // GREETING
    //-----------------------------------
    if(isGreeting(message)){
        setTimeout(()=>{
            addBotMessage(greetingResponse(message));
        },400);

        return;
    }

    //-----------------------------------
    // REAL ANALYSIS
    //-----------------------------------
    isProcessing = true;
    sendBtn.disabled = true;

    showTypingIndicator();

    try{

        const response = await fetch(WEBHOOK_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                question:message
            })
        });

        const data = await response.json();

        removeTypingIndicator();

        addBotMessage(
            data.response ||
            data.message ||
            "No analytical response generated."
        );

    }catch(error){

        removeTypingIndicator();

        addBotMessage(`
❌ Connection error with AI engine.

Please try again in a few seconds.
        `);

        console.error(error);
    }

    isProcessing = false;
    sendBtn.disabled = false;
}

//------------------------------------------
// ENTER KEY
//------------------------------------------
function handleEnter(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}

//------------------------------------------
// AUTOSCROLL
//------------------------------------------
function scrollToBottom(){
    const chat = document.getElementById("chatContainer");
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=350, initial-scale=1.0">
<title>AI Assistant - Saylus Group</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* =========================
   EXPERIENCE BUILDER WIDTH
========================= */
html{
    width:350px;
    height:100%;
    overflow:hidden;
}

body{
    width:350px;
    height:100%;
    overflow:hidden;
    background:#f4f7f5;
    display:flex;
    flex-direction:column;
    margin:0 auto;
}

/* =========================
   HEADER
========================= */
.header{
    background:linear-gradient(90deg,#001b0d,#003d1f,#005d2f);
    color:white;
    padding:14px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:2px solid #39ff14;
    flex-shrink:0;
}

.logo{
    width:65px;
    height:65px;
    border-radius:50%;
    background:white;
    border:2px solid #39ff14;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header-text h1{
    color:#39ff14;
    font-size:18px;
    font-weight:bold;
}

.header-text h2{
    font-size:12px;
    font-weight:normal;
}

/* =========================
   CHAT BACKGROUND
========================= */
.chat-container{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;

    background:
        radial-gradient(circle at 20% 20%, rgba(57,255,20,0.03) 0%, transparent 20%),
        radial-gradient(circle at 80% 70%, rgba(0,100,40,0.04) 0%, transparent 25%),
        linear-gradient(
            rgba(248,250,248,0.98),
            rgba(242,245,243,0.98)
        );
}

/* =========================
   WHATSAPP STYLE MESSAGES
========================= */
.message{
    max-width:80%;
    padding:12px 14px;
    border-radius:18px;
    line-height:1.5;
    font-size:14px;
    word-wrap:break-word;
    white-space:pre-line;
    position:relative;
    box-shadow:0px 2px 6px rgba(0,0,0,0.08);
}

/* BOT */
.bot-message{
    background:#ffffff;
    color:#1f1f1f;
    align-self:flex-start;
    border-bottom-left-radius:6px;
}

/* USER */
.user-message{
    background:#d9fdd3;
    color:#1f1f1f;
    align-self:flex-end;
    border-bottom-right-radius:6px;
}

/* =========================
   TYPING ANIMATION
========================= */
.typing{
    background:white;
    width:90px;
    padding:14px;
    border-radius:18px;
    border-bottom-left-radius:6px;
    display:flex;
    gap:6px;
    align-self:flex-start;
    box-shadow:0px 2px 6px rgba(0,0,0,0.08);
}

.typing span{
    width:10px;
    height:10px;
    background:#00a63e;
    border-radius:50%;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:0.2s;
}

.typing span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:translateY(0);
    }
    40%{
        transform:translateY(-8px);
    }
}

/* =========================
   INPUT AREA
========================= */
.input-container{
    display:flex;
    gap:10px;
    padding:14px;
    background:white;
    border-top:1px solid #e5e5e5;
    flex-shrink:0;
}

.input-container input{
    flex:1;
    padding:14px;
    border-radius:25px;
    border:1px solid #dcdcdc;
    outline:none;
    font-size:14px;
    background:#f8f8f8;
}

.input-container button{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg,#00b140,#39ff14);
    cursor:pointer;
    font-size:20px;
    color:white;
    box-shadow:0px 3px 8px rgba(0,0,0,0.15);
    transition:0.3s;
}

.input-container button:hover{
    transform:scale(1.05);
}

.input-container button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* =========================
   SCROLL
========================= */
.chat-container::-webkit-scrollbar{
    width:5px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:#39ff14;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

    <div class="logo">
        <img 
            src="https://raw.githubusercontent.com/saylusgis/chat-arcgis-ai/refs/heads/main/logo-ai.png"
            alt="AI Logo">
    </div>

    <div class="header-text">
        <h1>AI Assistant</h1>
        <h2>SAYLUS GROUP</h2>
    </div>

</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer">

    <div class="message bot-message">
Hello, I'm your fuel intelligence assistant.

Ask me about:

• Fuel consumption  
• Vehicle costs  
• Fleet performance  
• Fuel pricing  
• Historical comparisons  
• Date analysis
    </div>

</div>

<!-- INPUT -->
<div class="input-container">

    <input 
        type="text"
        id="userInput"
        placeholder="Ask about your fleet..."
        onkeypress="handleEnter(event)"
    >

    <button id="sendBtn" onclick="sendMessage()">➤</button>

</div>

<script>
const WEBHOOK_URL =
"https://saylusglobal.app.n8n.cloud/webhook/arcgis-fuelmanagement";

let isProcessing = false;

/* USER MESSAGE */
function addUserMessage(message){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message user-message";
    div.textContent = message;

    chat.appendChild(div);
    scrollToBottom();
}

/* BOT MESSAGE */
function addBotMessage(message){
    const chat = document.getElementById("chatContainer");

    const div = document.createElement("div");
    div.className = "message bot-message";
    div.innerHTML = formatResponse(message);

    chat.appendChild(div);
    scrollToBottom();
}

/* FORMAT RESPONSE */
function formatResponse(message){
    if(typeof message !== "string"){
        return JSON.stringify(message,null,2);
    }

    return message.replace(/\n/g,"<br>");
}

/* TYPING */
function showTypingIndicator(){
    const chat = document.getElementById("chatContainer");

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.id = "typingIndicator";

    typing.innerHTML = `
        <span></span>
        <span></span>
        <span></span>
    `;

    chat.appendChild(typing);
    scrollToBottom();
}

function removeTypingIndicator(){
    const typing =
        document.getElementById("typingIndicator");

    if(typing){
        typing.remove();
    }
}

/* GREETING DETECTION */
function isGreeting(message){

    const greetings = [
        "hola",
        "hello",
        "hi",
        "hey",
        "buenas",
        "buenos dias",
        "good morning",
        "good afternoon"
    ];

    const lower = message.toLowerCase().trim();

    return greetings.some(
        g => lower === g || lower.includes(g)
    );
}

/* GREETING RESPONSE */
function greetingResponse(message){

    const lower = message.toLowerCase();

    if(
        lower.includes("hola") ||
        lower.includes("buenas")
    ){
        return `
👋 Hola, soy AI Assistant Saylus Group.

Puedo ayudarte con:

• Consumo de combustible  
• Costos por vehículo  
• Rendimiento operativo  
• Incrementos de precio  
• Comparaciones históricas  
• Análisis por fechas

¿En qué puedo ayudarte?
        `;
    }

    return `
👋 Hello, I'm AI Assistant Saylus Group.

I can help you with:

• Fuel consumption  
• Vehicle costs  
• Fleet performance  
• Fuel pricing  
• Historical comparisons  
• Date analysis

How can I help you today?
    `;
}

/* SEND MESSAGE */
async function sendMessage(){

    if(isProcessing) return;

    const input =
        document.getElementById("userInput");

    const sendBtn =
        document.getElementById("sendBtn");

    const message =
        input.value.trim();

    if(!message) return;

    addUserMessage(message);
    input.value = "";

    /* Greeting */
    if(isGreeting(message)){
        setTimeout(()=>{
            addBotMessage(
                greetingResponse(message)
            );
        },400);
        return;
    }

    /* Real Query */
    isProcessing = true;
    sendBtn.disabled = true;

    showTypingIndicator();

    try{

        const response = await fetch(
            WEBHOOK_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    question:message
                })
            }
        );

        const data =
            await response.json();

        removeTypingIndicator();

        addBotMessage(
            data.response ||
            data.message ||
            "No analytical response generated."
        );

    } catch(error){

        removeTypingIndicator();

        addBotMessage(`
❌ Error connecting with AI service.

Please try again.
        `);

        console.error(error);
    }

    isProcessing = false;
    sendBtn.disabled = false;
}

/* ENTER */
function handleEnter(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}

/* AUTOSCROLL */
function scrollToBottom(){
    const chat =
        document.getElementById("chatContainer");

    chat.scrollTop =
        chat.scrollHeight;
}
</script>

</body>
</html>
